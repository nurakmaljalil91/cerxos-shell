<div class="relative">
  <button
    aria-haspopup="menu"
    aria-label="Open profile menu"
    class="flex items-center gap-2 rounded-lg py-1.5 pl-2 pr-2 hover:bg-[var(--cxs-color-surface-hover)] sm:pl-3 sm:pr-3"
    type="button"
    [attr.aria-expanded]="profileOpen()"
    (click)="toggleProfile()"
    (keydown.enter)="toggleProfile()"
    (keydown.space)="toggleProfile()"
  >
    <cxs-avatar size="sm" [name]="displayName()" [src]="avatarSrc()" />
    <span class="hidden sm:block text-sm font-medium">{{ displayName() }}</span>
    <svg
      aria-hidden="true"
      class="hidden sm:block w-4 h-4 opacity-70"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="1.5"
        [attr.d]="'chevron-down' | heroIconHelper"
      />
    </svg>
  </button>

  <!-- Profile menu -->
  @if (profileOpen()) {
    <!-- overlay to close on outside click -->
    <div aria-hidden="true" class="fixed inset-0 z-30" (click)="closeMenus()"></div>

    <div
      class="absolute right-0 z-40 mt-2 w-56 rounded-xl border border-(--cxs-color-border) bg-(--cxs-color-surface) py-2 text-(--cxs-color-on-surface) shadow-lg"
      role="menu"
    >
      <div class="border-b border-(--cxs-color-border) px-3 pb-2">
        <p class="text-sm font-semibold truncate">{{ displayName() }}</p>
        <p class="truncate text-xs text-(--cxs-color-on-surface-muted)">{{ email() }}</p>
      </div>

      <a
        class="block px-3 py-2 text-sm hover:bg-[var(--cxs-color-surface-hover)]"
        role="menuitem"
        routerLink="/profile"
        >Profile</a
      >
      <a
        class="block px-3 py-2 text-sm hover:bg-[var(--cxs-color-surface-hover)]"
        role="menuitem"
        routerLink="/settings"
        >Settings</a
      >
      <a
        class="block px-3 py-2 text-sm hover:bg-[var(--cxs-color-surface-hover)]"
        role="menuitem"
        routerLink="/billing"
        >Billing</a
      >

      <div class="my-1 border-t border-(--cxs-color-border)"></div>

      <button
        class="w-full px-3 py-2 text-left text-sm hover:bg-[var(--cxs-color-surface-hover)]"
        role="menuitem"
        type="button"
        (click)="signOut()"
      >
        Sign out
      </button>
    </div>
  }
</div>
