<!-- Notifications -->
<div class="relative">
  <button
    aria-haspopup="menu"
    aria-label="Open notifications"
    class="relative rounded-lg p-2 hover:bg-[var(--cxs-color-surface-hover)]"
    type="button"
    [attr.aria-expanded]="notificationOpen()"
    (click)="toggleNotification()"
    (keydown.enter)="toggleNotification()"
    (keydown.space)="toggleNotification()"
  >
    <svg aria-hidden="true" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="1.5"
        [attr.d]="'bell' | heroIconHelper"
      />
    </svg>
    <!-- unread dot -->
    @if (unreadCount() > 0) {
      <span
        aria-hidden="true"
        class="absolute -right-0.5 -top-0.5 inline-flex h-2.5 w-2.5 rounded-full bg-red-500 ring-2 ring-(--cxs-color-surface)"
      ></span>
      <span class="sr-only">{{ unreadCount() }} unread notifications</span>
    }
  </button>

  <!-- Notifications menu -->
  @if (notificationOpen()) {
    <!-- overlay to close on outside click -->
    <div aria-hidden="true" class="fixed inset-0 z-30" (click)="closeMenus()"></div>

    <div
      class="absolute right-0 z-40 mt-2 w-80 max-w-[90vw] rounded-xl border border-(--cxs-color-border) bg-(--cxs-color-surface) text-(--cxs-color-on-surface) shadow-lg"
    >
      <div class="flex items-center justify-between border-b border-(--cxs-color-border) px-3 py-2">
        <span class="text-sm font-semibold">Notifications</span>
        <button
          class="rounded px-2 py-1 text-xs hover:bg-[var(--cxs-color-surface-hover)]"
          type="button"
          (click)="markAllRead()"
        >
          Mark all read
        </button>
      </div>

      <ul class="max-h-80 overflow-y-auto">
        @for (n of notifications; track n.id) {
          <li>
            <button
              class="flex w-full items-start gap-3 px-3 py-2 text-left hover:bg-[var(--cxs-color-surface-hover)]"
              type="button"
              (click)="openNotification(n)"
            >
              <span
                aria-hidden="true"
                class="mt-1 h-2 w-2 rounded-full"
                [class.bg-blue-500]="!n.read"
                [class.bg-transparent]="n.read"
              ></span>
              <div class="min-w-0">
                <p class="text-sm font-medium truncate">{{ n.title }}</p>
                <p class="truncate text-xs text-(--cxs-color-on-surface-muted)">{{ n.body }}</p>
                <p class="mt-0.5 text-[11px] text-(--cxs-color-on-surface-muted)">{{ n.when }}</p>
              </div>
            </button>
          </li>
        } @empty {
          <li class="px-3 py-4 text-sm text-(--cxs-color-on-surface-muted)">No notifications</li>
        }
      </ul>
    </div>
  }
</div>
